spring.application.name=sante-kunafoni-app

# Configuration de la route principale globale (Bonne pratique)
spring.mvc.servlet.path=/sante-kunafoni-api/v1


spring.datasource.url=jdbc:mysql://localhost:3306/santekunafoni?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true